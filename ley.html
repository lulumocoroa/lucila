<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ley Argentina</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    padding:40px;
}

section{
    background:#1e293b;
    padding:40px;
    border-radius:25px;
    max-width:1200px;
    margin:auto;
}

h1{
    color:#38bdf8;
    margin-bottom:20px;
}

p{
    margin-bottom:30px;
    line-height:1.8;
}

.media-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.media-box{
    overflow:hidden;
    border-radius:20px;
    transition:0.35s;
}

.media-box:hover{

    transform:
    translateY(-10px)
    scale(1.03);

}

.media-box img{
    width:100%;
    height:230px;
    object-fit:cover;
}

.youtube-card{
    display:block;
    background:#020617;
    border-radius:20px;
    overflow:hidden;
    text-decoration:none;
    color:white;
    transition:0.35s;
}

.youtube-card:hover{

    transform:
    translateY(-10px)
    scale(1.03);

}

.youtube-card img{
    width:100%;
    height:230px;
    object-fit:cover;
}

.youtube-info{
    padding:20px;
}

.youtube-info h3{
    color:#38bdf8;
    margin-bottom:10px;
}

.boton{
    display:inline-block;
    margin-top:30px;
    background:#38bdf8;
    color:black;
    padding:14px 24px;
    border-radius:12px;
    text-decoration:none;
    font-weight:bold;
    transition:0.35s;
}

.boton:hover{

    transform:
    translateY(-10px)
    scale(1.03);

}

.voice-controls{
    position:fixed;
    bottom:20px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.voice-button{
    background:rgb(33, 140, 202);
    border:none;
    padding:15px;
    border-radius:50px;
    cursor:pointer;
    font-weight:bold;
}

</style>

</head>

<body>

<section aria-labelledby="titulo-ley">

<h1 id="titulo-ley">
Ley Argentina sobre accesibilidad web
</h1>

<p>
La Ley N.º 26.653 establece que los sitios web del Estado deben ser accesibles para personas con discapacidad.
</p>

<div class="media-grid">

<div class="media-box">

<img
src="foto5.jpg"
alt="Imagen relacionada con derechos digitales y accesibilidad">

</div>

<div class="media-box">

<img
src="foto6.jpg"
alt="Persona utilizando herramientas digitales accesibles">

</div>

<a
href="https://www.youtube.com/watch?v=20SHvU2PKsM"
target="_blank"
class="youtube-card"
aria-label="Abrir video sobre ley de accesibilidad web">

<img
src="https://img.youtube.com/vi/20SHvU2PKsM/maxresdefault.jpg"
alt="Miniatura del video sobre accesibilidad web">

<div class="youtube-info">

<h3>
Ley de accesibilidad web
</h3>

<p>
Video explicativo sobre accesibilidad digital y derechos de las personas con discapacidad.
</p>

</div>

</a>

</div>

<a
href="index.html"
class="boton"
aria-label="Volver al inicio">

Volver al inicio

</a>

</section>

<div class="voice-controls">

<button
class="voice-button"
onclick="leerContenido()"
aria-label="Escuchar contenido">

🔊 Escuchar

</button>

<button
class="voice-button"
onclick="pausarLectura()"
aria-label="Pausar lectura">

⏸️ Pausar

</button>

</div>

<script>

let vozActual;

function leerContenido(){

    const texto = document.body.innerText;

    vozActual = new SpeechSynthesisUtterance(texto);

    vozActual.lang = "es-ES";

    speechSynthesis.cancel();

    speechSynthesis.speak(vozActual);

}

function pausarLectura(){

    if(speechSynthesis.speaking && !speechSynthesis.paused){

        speechSynthesis.pause();

    }else if(speechSynthesis.paused){

        speechSynthesis.resume();

    }

}

</script>
</body>
</html>
