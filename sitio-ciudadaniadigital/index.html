<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Accesibilidad Inclusiva</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --fondo:#0f172a;
    --fondo2:#111827;
    --principal:#38bdf8;
    --texto:#f8fafc;
    --gris:#cbd5e1;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,var(--fondo),var(--fondo2));
    color:var(--texto);
    line-height:1.8;
}

.integrantes{
    background:#020617;
    padding:18px;
    text-align:center;
}

.integrantes p{
    color:#cbd5e1;
}

header{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
}

h1{
    font-size:65px;
    color:var(--principal);
    margin-bottom:20px;
}

.parrafo-principal{
    max-width:900px;
    font-size:22px;
    color:var(--gris);
    margin-bottom:40px;
}

.botones{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.boton{
    background:var(--principal);
    color:black;
    padding:16px 28px;
    border-radius:14px;
    text-decoration:none;
    font-weight:bold;
    transition:0.35s;
}

.boton:hover{

    transform:
    translateY(-10px)
    scale(1.03);

    background:white;
}

.voice-controls{
    position:fixed;
    bottom:20px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.voice-button{
    background:var(--principal);
    border:none;
    padding:15px;
    border-radius:50px;
    cursor:pointer;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="integrantes">

<p>
INTEGRANTES: NOMBRE 1 - NOMBRE 2 - NOMBRE 3
</p>

</div>

<div class="voice-controls">

<button
class="voice-button"
onclick="leerContenido()"
aria-label="Escuchar contenido">

🔊 Escuchar

</button>

<button
class="voice-button"
onclick="pausarLectura()"
aria-label="Pausar lectura">

⏸️ Pausar

</button>

</div>

<header aria-labelledby="titulo-principal">

<h1 id="titulo-principal">
Accesibilidad Inclusiva
</h1>

<p class="parrafo-principal">

AQUÍ VA TU PÁRRAFO REFLEXIVO.

</p>

<div class="botones">

<a
href="navegacion.html"
class="boton"
aria-label="Ir a página sobre navegación accesible">

¿Cómo navegan?

</a>

<a
href="lectores.html"
class="boton"
aria-label="Ir a página sobre lectores de pantalla">

Lectores de pantalla

</a>

<a
href="aria.html"
class="boton"
aria-label="Ir a página sobre etiquetas ARIA">

Etiquetas ARIA

</a>

<a
href="ley.html"
class="boton"
aria-label="Ir a página sobre ley argentina">

Ley Argentina

</a>

<a
href="ia.html"
class="boton"
aria-label="Ir a página sobre inteligencia artificial">

IA y Accesibilidad

</a>

</div>

</header>

<script>

let vozActual;

function leerContenido(){

    const texto = document.body.innerText;

    vozActual = new SpeechSynthesisUtterance(texto);

    vozActual.lang = "es-ES";

    speechSynthesis.cancel();

    speechSynthesis.speak(vozActual);

}

function pausarLectura(){

    if(speechSynthesis.speaking && !speechSynthesis.paused){

        speechSynthesis.pause();

    }else if(speechSynthesis.paused){

        speechSynthesis.resume();

    }

}

</script>

</body>
</html>
